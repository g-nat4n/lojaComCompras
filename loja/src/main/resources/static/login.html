<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Modern Dark</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1000;
            object-fit: cover;
            filter: brightness(35%); /
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            z-index: 1;
        }

        .container h2 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            outline: none;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .container input:focus {
            border-color: #ffffff;
            background: rgba(0, 0, 0, 0.5);
        }

        .container button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #000000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .container button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .container a {
            display: block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }

        .container a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .erro {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

<video autoplay muted loop id="bg-video">
    <source src="uploads/video.mp4 " type="video/mp4">
</video>

<div class="container" id="box">
    <h2>🔐 LOGIN</h2>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">ENTRAR</button>

    <div class="erro" id="erro"></div>

    <a href="registro.html">Não tem conta? Cadastre-se</a>
</div>

<script>
    async function login() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;
        const erro = document.getElementById("erro");
        const box = document.getElementById("box");

        erro.innerText = "";

        if (!email || !senha) {
            erro.innerText = "Preencha todos os campos!";
            return;
        }

        try {
            box.classList.add("loading");

            const response = await fetch("http://localhost:8080/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email, senha })
            });

            if (!response.ok) throw new Error("Credenciais inválidas.");

            const token = await response.text();
            localStorage.setItem("token", token);

            // Validação rápida no back-end
            const teste = await fetch("http://localhost:8080/auth/me", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!teste.ok) throw new Error("Sessão não autorizada.");

            window.location.href = "/index.html";

        } catch (e) {
            erro.innerText = e.message;
        } finally {
            box.classList.remove("loading");
        }
    }
</script>

</body>
</html>
