<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <style>
        body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITULO */
.container h2 {
    margin-bottom: 20px;
}

/* INPUTS */
.container input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

.container input:focus {
    border-color: #6c63ff;
}

/* BOTAO */
.container button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #6c63ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.container button:hover {
    background: #5848e5;
}

/* LINK */
.container a {
    display: block;
    margin-top: 15px;
    color: #6c63ff;
    text-decoration: none;
}

.container a:hover {
    text-decoration: underline;
}
    </style>
</head>

<body>

<div class="container">
    <h2>📝 Cadastro</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="registrar()">Cadastrar</button>

    <a href="login.html">Já tem conta? Entrar</a>
</div>

<script>
    async function registrar() {
        await fetch("/auth/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email: document.getElementById("email").value,
                senha: document.getElementById("senha").value
            })
        });

        alert("Cadastro realizado!");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
