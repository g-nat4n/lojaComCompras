<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Loja</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f5f5f5;
        }

       /* NAVBAR NOVA */
header {
    background: #111;
    color: white;
    padding: 10px 30px;
}

/* linha de cima */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* busca central */
.busca {
    flex: 1;
    display: flex;
    justify-content: center;
}
.input-busca {
    position: relative;
    width: 60%;
    max-width: 400px;
}

.input-busca input {
    width: 100%;
    height: 40px;
    padding: 0 0px 0 0px;
    border-radius: 20px;
    border: none;
    outline: none;
     line-height: 40px;
    text-align: center;
    font-size: 16px;
}

/* botão dentro do input */
.input-busca button {
    position: absolute;
    right: 5px;
    top: 5px;
    height: 30px;
    width: 30px;
    border: none;
    background: #3483fa;
    color: white;
    border-radius: 50%;
    cursor: pointer;
}


/* carrinho */
#iconeCarrinho {
    cursor: pointer;
}

/* menu embaixo */
.menu {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #333;
}

.menu a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    color: #00c3ff;
}




        /* CARROSSEL */
        .carousel {
            width: 80%;
            height: 300px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .carousel img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: none;
        }

        .carousel img.active {
            display: block;
        }

        /* DOTS */
        .dots {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
        }

        .dot {
            height: 10px;
            width: 10px;
            margin: 5px;
            background: #ccc;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }

        .dot.active {
            background: #007bff;
        }

        /* LAYOUT */
       .main {
    width: 80%;
    margin: 0 auto;
    display: flex;
    padding: 20px 0;
}

        /* FILTROS */
       .sidebar {
    width: 250px;
    min-width: 250px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-right: 20px;
}

        /* PRODUTOS */
        .content {
            flex: 1;
        }

        .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px 20px;
    align-items: stretch
}

        /* CARD */
        .card {
            background: white;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #eee;
            transition: 0.2s;

            display: flex;
            flex-direction: column;
            height: 100%;
            margin-bottom: 5px;
        }

        .card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            font-size: 16px;
            min-height: 40px;
        }

        .card p {
            color: #00a650;
            font-weight: bold;
        }

        .card button {
            margin-top: auto;
            width: 100%;
            padding: 10px;
            background: #3483fa;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card img {
            height: 200px;
         }


/* BADGE */
.badge {
    position: absolute;
    background: red;
    color: white;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 5px;
    top: 10px;
    left: 10px;
}

/* CARD MELHORADO */
.card {
    position: relative;
}

/* PREÇO */
.preco {
    display: flex;
    flex-direction: column;
}

.antigo {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}

.atual {
    color: #00a650;
    font-size: 20px;
    font-weight: bold;
}

/* FRETE */
.frete {
    color: #00a650;
    font-size: 13px;
    margin: 5px 0;
}

/* ESTRELAS */
.stars {
    color: #f7b500;
    font-size: 14px;
    margin-bottom: 10px;
}


        /* CARRINHO */
      #carrinho {
    position: fixed;
    right: -350px; /* 🔥 começa escondido */
    top: 0;
    width: 320px;
    height: 100%;
    background: #fff;
    box-shadow: -4px 0 15px rgba(0,0,0,0.2);
    padding: 20px;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    z-index: 1000; /* 🔥 garante que fica acima */
}

#carrinho.ativo {
    right: 0;
}

        .carrinho-header {
            display: flex;
            justify-content: space-between;
        }

        .item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .total {
    margin-top: 20px; /* 🔥 sobe pra perto dos itens */
    font-size: 18px;
    font-weight: bold;
}

        .btn-comprar {
    margin-top: 10px;
    padding: 12px;
    background: #00a650;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

        /* FOOTER (🔥 corrigido) */
        footer {
            background: #111;
            color: white;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }


        .link-login {
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #6c63ff;
    color: #6c63ff;
    font-weight: 600;
    transition: 0.3s;
}

/* hover bonito */
.link-login:hover {
    background: #6c63ff;
    color: white;
}

/* efeito clique */
.link-login:active {
    transform: scale(0.95);
}

        /* usuário logado */
.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #6c63ff; /* mesma cor do hover do login */
    font-weight: 600;
}

/* botão sair */
.btn-logout {
    padding: 6px 12px;
    border: 2px solid #ff4d4d;
    background: transparent;
    color: #ff4d4d;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.btn-logout:hover {
    background: #ff4d4d;
    color: white;
}

.btn-logout:active {
    transform: scale(0.95);
}
    </style>
</head>

<body>

<header>
    <div class="topo">
        <h2>🛍️ Minha Loja</h2>

        <div class="busca">
            <div class="input-busca">
                <input type="text" placeholder="Buscar produtos...">
                <button>🔍</button>
            </div>
        </div>

        <div style="display: flex; gap: 15px; align-items: center;">

            <!-- LOGIN / USER -->
            <div id="userArea">
                <a href="/login.html" class="link-login">
                    👤 Login
                </a>
            </div>

            <!-- CARRINHO -->
            <div id="iconeCarrinho" onclick="toggleCarrinho()" style="cursor:pointer;">
                🛒 (<span id="qtd">0</span>)
            </div>

        </div>
    </div>

    <nav class="menu">
        <a href="#">Início</a>
        <a href="/contato.html">Contato</a>
        <a href="#">Promoções</a>
    </nav>
</header>

<!-- CARROSSEL -->
<div class="carousel">
    <img src="uploads/banner 5.jpg" class="active">
    <img src="uploads/banner 6.jpg">
    <img src="uploads/banner 7.jpg">
    <img src="uploads/banner 8.jpg">
    <div class="dots"></div>
</div>

<div class="main">

    <div class="sidebar">
        <h3>Filtros</h3>
        <input type="number" id="filtroPreco">
        <button onclick="filtrar()">Filtrar</button>
    </div>

    <div class="content">
        <div class="grid" id="produtos"></div>
    </div>

</div>

<!-- CARRINHO -->
<div id="carrinho">
    <div class="carrinho-header">
        <h3>🛒 Carrinho</h3>
        <span onclick="toggleCarrinho()">✖</span>
    </div>

    <div id="itens"></div>

    <div class="total">
        Total: R$ <span id="total">0</span>
    </div>

    <button class="btn-comprar" onclick="comprar()">Comprar</button>
</div>

<footer>
    <p>Minha Loja © 2026</p>
    <p>contato@minhaloja.com</p>
</footer>

<script>

    let produtosGlobais = [];
  let indexCarousel = 0;

  const API = "http://localhost:8080";

  // =====================
  // TOKEN / LOGIN
  // =====================
  function getToken() {
      return localStorage.getItem("token");
  }

  function isLogado() {
      return !!getToken();
  }

  function logout() {
      localStorage.removeItem("token");
      location.reload();
  }

  // =====================
  // INIT
  // =====================
  document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("carrinho").classList.remove("ativo");

      iniciarCarousel();
      verificarLogin();
      carregarProdutos();
      carregarCarrinho();
  });

  // =====================
  // CARROSSEL COM DOTS
  // =====================
  function iniciarCarousel() {
      const imgs = document.querySelectorAll(".carousel img");
      const dotsContainer = document.querySelector(".dots");

      if (!imgs.length) return;

      dotsContainer.innerHTML = "";

      imgs.forEach((_, i) => {
          const dot = document.createElement("span");
          dot.classList.add("dot");
          dot.onclick = () => irParaSlide(i);
          dotsContainer.appendChild(dot);
      });

      atualizarCarousel();
      setInterval(nextSlide, 3000);
  }

  function atualizarCarousel() {
      const imgs = document.querySelectorAll(".carousel img");
      const dots = document.querySelectorAll(".dot");

      imgs.forEach(img => img.classList.remove("active"));
      dots.forEach(dot => dot.classList.remove("active"));

      imgs[indexCarousel].classList.add("active");
      if (dots[indexCarousel]) {
          dots[indexCarousel].classList.add("active");
      }
  }

  function nextSlide() {
      const imgs = document.querySelectorAll(".carousel img");

      indexCarousel = (indexCarousel + 1) % imgs.length;
      atualizarCarousel();
  }

  function irParaSlide(i) {
      indexCarousel = i;
      atualizarCarousel();
  }

  // =====================
  // LOGIN (SEM MEXER NO SEU BOTÃO)
  // =====================
  async function verificarLogin() {
    if (!isLogado()) return;

    try {
        const res = await fetch(API + "/auth/me", {
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        if (!res.ok) throw new Error();

        const email = await res.text();

        document.getElementById("userArea").innerHTML = `
            <div class="user-info">
                👤 <span class="user-email">${email}</span>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        `;

    } catch (e) {
        logout();
    }
}

  // =====================
  // PRODUTOS
  // =====================
  async function carregarProdutos() {
      const res = await fetch(API + "/produtos");
      produtosGlobais = await res.json();
      render(produtosGlobais);
  }

  function abrirProduto(id) {
      window.location.href = `produto.html?id=${id}`;
  }

  function render(lista) {
      const grid = document.getElementById("produtos");
      grid.innerHTML = "";

      lista.forEach(p => {
          let precoOriginal = p.valor * 1.2;

          grid.innerHTML += `
              <div class="card" onclick="abrirProduto(${p.id})">
                  <div class="badge">NOVO</div>

                  <img src="${API}/uploads/${p.imagem}">

                  <h3>${p.produto}</h3>

                  <div class="preco">
                      <span class="antigo">R$ ${precoOriginal.toFixed(2)}</span>
                      <span class="atual">R$ ${p.valor}</span>
                  </div>

                  <div class="frete">🚚 Frete grátis</div>
                  <div class="stars">⭐⭐⭐⭐⭐</div>

                  <button onclick="add(${p.id}, event)">
                      Adicionar
                  </button>
              </div>
          `;
      });
  }

  // =====================
  // CARRINHO
  // =====================
  async function add(id, event) {

      event.stopPropagation();

      if (!isLogado()) {
          alert("Faça login para adicionar ao carrinho!");
          window.location.href = "/login.html";
          return;
      }

      await fetch(API + "/carrinho/adicionar", {
          method: "POST",
          headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({
              produtoId: id,
              quantidade: 1
          })
      });

      animarProduto(event);
      await carregarCarrinho();
  }

  async function carregarCarrinho() {
      if (!isLogado()) return;

      try {
          const res = await fetch(API + "/carrinho", {
              headers: {
                  "Authorization": "Bearer " + getToken()
              }
          });

          const carrinho = await res.json();
          atualizarCarrinhoUI(carrinho);

      } catch (e) {
          console.error(e);
      }
  }

  function atualizarCarrinhoUI(carrinho) {

      const itens = document.getElementById("itens");
      const totalEl = document.getElementById("total");
      const qtd = document.getElementById("qtd");

      itens.innerHTML = "";

      let total = 0;
      let totalQtd = 0;

      const listaItens = carrinho?.itens ?? [];

      if (listaItens.length === 0) {
          itens.innerHTML = "<p>Carrinho vazio</p>";
          totalEl.innerText = "0.00";
          qtd.innerText = "0";
          return;
      }

      listaItens.forEach(item => {

          const p = item.produto;

          itens.innerHTML += `
              <div class="item">
                  <img src="${API}/uploads/${p.imagem}">

                  <div style="flex:1;">
                      <div><strong>${p.produto}</strong></div>
                      <div>R$ ${p.valor}</div>

                      <div>
                          <button onclick="diminuir(${p.id})">-</button>
                          ${item.quantidade}
                          <button onclick="aumentar(${p.id})">+</button>
                      </div>
                  </div>

                  <button onclick="remover(${p.id})">X</button>
              </div>
          `;

          total += p.valor * item.quantidade;
          totalQtd += item.quantidade;
      });

      totalEl.innerText = total.toFixed(2);
      qtd.innerText = totalQtd;
  }

  // =====================
  // ALTERAÇÕES
  // =====================
  async function aumentar(produtoId) {
      await fetch(API + "/carrinho/adicionar", {
          method: "POST",
          headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({
              produtoId,
              quantidade: 1
          })
      });

      await carregarCarrinho();
  }

  async function diminuir(produtoId) {
      await fetch(API + `/carrinho/remover/${produtoId}`, {
          method: "DELETE",
          headers: {
              "Authorization": "Bearer " + getToken()
          }
      });

      await carregarCarrinho();
  }

  async function remover(produtoId) {
      await fetch(API + `/carrinho/remover/${produtoId}`, {
          method: "DELETE",
          headers: {
              "Authorization": "Bearer " + getToken()
          }
      });

      await carregarCarrinho();
  }

  // =====================
  // ANIMAÇÃO
  // =====================
  function animarProduto(event) {

      const botao = event.target;
      const card = botao.closest(".card");
      const img = card.querySelector("img");

      const carrinhoIcon = document.getElementById("iconeCarrinho");

      const imgRect = img.getBoundingClientRect();
      const carrinhoRect = carrinhoIcon.getBoundingClientRect();

      const clone = img.cloneNode(true);

      clone.style.position = "fixed";
      clone.style.top = imgRect.top + "px";
      clone.style.left = imgRect.left + "px";
      clone.style.width = imgRect.width + "px";
      clone.style.height = imgRect.height + "px";
      clone.style.transition = "all 0.8s ease";
      clone.style.zIndex = "2000";

      document.body.appendChild(clone);

      setTimeout(() => {
          clone.style.top = carrinhoRect.top + "px";
          clone.style.left = carrinhoRect.left + "px";
          clone.style.width = "30px";
          clone.style.height = "30px";
          clone.style.opacity = "0.5";
      }, 10);

      setTimeout(() => clone.remove(), 800);
  }

  // =====================
  // CARRINHO UI
  // =====================
  function toggleCarrinho() {
      document.getElementById("carrinho").classList.toggle("ativo");
  }

  // =====================
  // COMPRA
  // =====================
  async function comprar() {

      if (!isLogado()) {
          alert("Faça login!");
          window.location.href = "/login.html";
          return;
      }

      const res = await fetch(API + "/carrinho", {
          headers: {
              "Authorization": "Bearer " + getToken()
          }
      });

      const carrinho = await res.json();
      const itens = carrinho?.itens ?? [];

      if (itens.length === 0) {
          alert("Carrinho vazio!");
          return;
      }

      let total = itens.reduce((s, item) => {
          return s + item.produto.valor * item.quantidade;
      }, 0);

      const pagamento = await fetch(API + "/pagamentos", {
          method: "POST",
          headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({ valor: total })
      });

      const link = await pagamento.text();
      window.location.href = link;
  }
</script>

</body>
</html>
