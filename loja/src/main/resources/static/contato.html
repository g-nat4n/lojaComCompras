<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Minha Loja</title>

    <style>
        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f5f5f5;

            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: #111;
            color: white;
            padding: 10px 30px;
        }

        .topo {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .busca {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .input-busca {
            position: relative;
            width: 60%;
            max-width: 400px;
        }

        .input-busca input {
            width: 100%;
            height: 40px;
            padding: 0 0px 0 0px;
            border-radius: 20px;
            border: none;
            outline: none;
             line-height: 40px;
    text-align: center;
    font-size: 16px;
        }

        .input-busca button {
            position: absolute;
            right: 5px;
            top: 5px;
            height: 30px;
            width: 30px;
            border: none;
            background: #3483fa;
            color: white;
            border-radius: 50%;
            cursor: pointer;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        /* 🔥 ISSO AQUI É O QUE FALTAVA */
        .container {
            width: 80%;
            margin: 40px auto;
            flex: 1; /* empurra o footer pro final */
        }

        /* FORM */
        .form-contato {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-contato h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .form-contato input,
        .form-contato textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .form-contato textarea {
            resize: none;
            height: 120px;
        }

        .form-contato button {
            width: 100%;
            padding: 12px;
            background: #00a650;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .form-contato button:hover {
            background: #008f45;
        }

        /* FOOTER */
        footer {
            background: #111;
            color: white;
            padding: 30px;
            text-align: center;
        }
    </style>

</head>

<body>

<!-- HEADER -->
<header>
    <div class="topo">
        <h2>🛍️ Minha Loja</h2>

        <div class="busca">
            <div class="input-busca">
                <input type="text" placeholder="Buscar produtos...">
                <button>🔍</button>
            </div>
        </div>

        <div>🛒 (0)</div>
    </div>

    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="contato.html">Contato</a>
        <a href="#">Promoções</a>
    </nav>
</header>

<!-- CONTEÚDO -->
<div class="container">
    <div class="form-contato">
        <h2>Fale Conosco</h2>

        <input type="text" placeholder="Seu nome">
        <input type="email" placeholder="Seu e-mail">
        <textarea placeholder="Digite sua mensagem..."></textarea>

        <button>Enviar Mensagem</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Minha Loja - Todos os direitos reservados</p>
</footer>

</body>
</html>
